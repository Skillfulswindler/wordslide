<script>/* Wordslide — shared config: dictionary, letters, bonuses, world definitions,
   power-ups, palette, persistence. Attaches everything to window.WS.
   Expects global `WORDLIST` (space-separated string). */
(function(){
"use strict";
const WS = (window.WS = window.WS || {});

WS.DICT = new Set((window.WORDLIST||"").split(" "));
WS.VALUES = {a:1,e:1,i:1,o:1,u:1,l:1,n:1,s:1,t:1,r:1,d:2,g:2,b:3,c:3,m:3,p:3,f:4,h:4,v:4,w:4,y:4,k:5,j:8,x:8,q:10,z:10};
WS.FREQ = {a:9,b:2,c:2,d:4,e:12,f:2,g:3,h:2,i:9,j:1,k:1,l:4,m:2,n:6,o:8,p:2,q:1,r:6,s:4,t:6,u:4,v:2,w:2,x:1,y:2,z:1};
WS.VOWELS = {a:1,e:1,i:1,o:1,u:1};
WS.BAG = []; for(const c in WS.FREQ){ for(let i=0;i<WS.FREQ[c];i++) WS.BAG.push(c); }

WS.HEX = n => "#"+(n>>>0).toString(16).padStart(6,"0").slice(-6);

WS.BONUS = {
  NONE:  {key:"NONE",  lm:1, wm:1, fill:0xFFF1CE, ink:0x5A3A22, tag:""},
  DL:    {key:"DL",    lm:2, wm:1, fill:0x5BB7E6, ink:0x0C447C, tag:"DL"},
  TL:    {key:"TL",    lm:3, wm:1, fill:0x56C06A, ink:0x173404, tag:"TL"},
  DW:    {key:"DW",    lm:1, wm:2, fill:0xF26C86, ink:0x4B1528, tag:"DW"},
  TW:    {key:"TW",    lm:1, wm:3, fill:0xF2A33C, ink:0x412402, tag:"TW"},
  GOLD:  {key:"GOLD",  lm:2, wm:1, fill:0xFBC85A, ink:0x6B4708, tag:"2x"},
};
WS.rollBonus = function(){
  const r=Math.random();
  if(r<0.66) return WS.BONUS.NONE;
  if(r<0.77) return WS.BONUS.DL;
  if(r<0.83) return WS.BONUS.TL;
  if(r<0.90) return WS.BONUS.DW;
  if(r<0.94) return WS.BONUS.TW;
  return WS.BONUS.GOLD;
};

WS.COLS=15; WS.ROWS=15;
WS.W=480; WS.H=854; WS.MARGIN=12;
WS.CELL=Math.floor((WS.W-2*WS.MARGIN)/WS.COLS);   // 30
WS.GAP=2; WS.TILE=WS.CELL-WS.GAP;
WS.BOARD_LEFT=WS.MARGIN;
WS.BOARD_TOP=150;
WS.BOARD_W=WS.CELL*WS.COLS;
WS.BOARD_H=WS.CELL*WS.ROWS;

WS.C = {
  ink:0x2B4257, mute:0x7C8A99, clay:0xC75B33, clayD:0xA4451F,
  teal:0x15A6A0, tealD:0x0E807B, gold:0xFBC85A, cream:0xFFF7E8, white:0xFFFFFF,
  selOutline:0x15A6A0, danger:0xE24B4A
};

// ---- worlds ----  sky:[topHex,botHex]; mode steady|wave
WS.WORLDS = {
  mudslide: { key:"mudslide", name:"Mudslide", order:1, sub:"Slow & sticky. Learn the ropes.",
    spawnInterval:1500, drops:1, ramp:90, minInterval:560, mode:"steady",
    accent:0x9C6B3F, accentD:0x6F4A28, sky:[0xCDB89A,0xF1E7D6], mtn:[0x9C6B3F,0x7A8B5A] },
  avalanche:{ key:"avalanche", name:"Avalanche", order:2, sub:"Letters arrive in waves.",
    spawnInterval:1150, drops:1, ramp:75, minInterval:520, mode:"wave", waveEvery:4200, waveCount:6,
    accent:0x6F8FA8, accentD:0x4C6577, sky:[0xAFC7DA,0xEAF2F7], mtn:[0x8FA6B8,0xC7D6E0] },
  volcano:  { key:"volcano", name:"Volcano", order:3, sub:"Ember tiles — use them fast.",
    spawnInterval:1000, drops:1, ramp:70, minInterval:460, mode:"steady", emberChance:0.13, emberFuse:9000,
    accent:0xC0392B, accentD:0x8C2418, sky:[0xE7A77F,0xF5D6C6], mtn:[0x7A2A1C,0xC0392B] },
  waterfall:{ key:"waterfall", name:"Waterfall", order:4, sub:"Constant, relentless flow.",
    spawnInterval:650, drops:1, ramp:55, minInterval:360, mode:"steady",
    accent:0x1C7293, accentD:0x12506A, sky:[0x9AD3E6,0xE3F4F9], mtn:[0x2E8BA8,0x7FC2D6] },
  blizzard: { key:"blizzard", name:"Blizzard", order:5, sub:"Frost hides your letters.",
    spawnInterval:800, drops:1, ramp:60, minInterval:380, mode:"steady", frostEvery:6500, frostCount:8, frostDur:2600,
    accent:0x6CA0C9, accentD:0x4A7CA0, sky:[0xDCEAF4,0xFFFFFF], mtn:[0xB8CFE0,0xE4EEF6] },
};
WS.WORLD_ORDER = ["mudslide","avalanche","volcano","waterfall","blizzard"];

// ---- power-ups ----
WS.POWERS = [
  { key:"slow",    name:"Solid Ground", cost:18, color:0x56C06A, desc:"Slow the slide 8s" },
  { key:"shuffle", name:"Shuffle",      cost:14, color:0x5BB7E6, desc:"Re-roll all letters" },
  { key:"rockfall",name:"Rockfall",     cost:26, color:0xC75B33, desc:"Clear bottom 2 rows" },
];

// ---- persistence ----
WS.store = {
  _read(){ try{ return JSON.parse(localStorage.getItem("wordslide_save")||"{}"); }catch(e){ return {}; } },
  _write(o){ try{ localStorage.setItem("wordslide_save", JSON.stringify(o)); }catch(e){} },
  best(world){ const s=this._read(); return (s.best&&s.best[world])||0; },
  setBest(world,score){ const s=this._read(); s.best=s.best||{}; if(score>(s.best[world]||0)){ s.best[world]=score; this._write(s); return true; } return false; },
  bestWord(){ const s=this._read(); return s.bestWord||{w:"",p:0}; },
  setBestWord(w,p){ const s=this._read(); const b=s.bestWord||{w:"",p:0}; if(p>b.p){ s.bestWord={w:w,p:p}; this._write(s); } },
  totalBest(){ const s=this._read(); let m=0; if(s.best) for(const k in s.best) m=Math.max(m,s.best[k]); return m; },
};
})();
</script>
<script>/* Wordslide — GameScene. Gravity board with per-world mechanics + power-ups.
   Reads window.WS (worlds.js). */
(function(){
"use strict";
const WS = window.WS;
const {COLS,ROWS,W,H,MARGIN,CELL,GAP,TILE,BOARD_LEFT,BOARD_TOP,BOARD_W,BOARD_H,
       VALUES,VOWELS,BAG,BONUS,DICT,C,HEX} = WS;

WS.GameScene = class extends Phaser.Scene {
  constructor(){ super("game"); }

  init(data){ this.cfg = WS.WORLDS[(data&&data.world)] || WS.WORLDS.mudslide; }

  create(){
    const cfg=this.cfg;
    this.grid=[]; for(let r=0;r<ROWS;r++) this.grid.push(new Array(COLS).fill(null));
    this.selection=[];
    this.score=0; this.level=1; this.words=0; this.combo=0; this.comboTimer=0;
    this.energy=0; this.best=""; this.bestPts=0;
    this.spawnInterval=cfg.spawnInterval; this.running=true; this.over=false; this.slowUntil=0;

    this.drawBackground();
    this.buildHUD();
    this.buildBoardFrame();
    this.buildControls();

    this.tileLayer=this.add.container(0,0);
    this.selGfx=this.add.graphics(); this.selGfx.setDepth(50);

    this.input.on("pointerdown", this.onDown, this);
    this.input.on("pointermove", this.onMove, this);
    this.input.on("pointerup", ()=>{ this.dragging=false; }, this);

    for(let i=0;i<44;i++) this.spawnTile(true);

    this.startSpawn();
    // ember + frost service loop
    this.svc=this.time.addEvent({delay:250, loop:true, callback:()=>this.service()});
    if(cfg.frostEvery) this.frostEvt=this.time.addEvent({delay:cfg.frostEvery, loop:true, callback:()=>this.frostWave()});
    this.refreshSelection(); this.updateEnergy();
  }

  startSpawn(){
    if(this.spawnEvent) this.spawnEvent.remove();
    const cfg=this.cfg;
    const delay = cfg.mode==="wave" ? cfg.waveEvery : this.spawnInterval;
    this.spawnEvent=this.time.addEvent({delay:delay, loop:true, callback:()=>this.tick()});
  }

  // ---------- background ----------
  drawBackground(){
    const cfg=this.cfg, g=this.add.graphics();
    const a=Phaser.Display.Color.IntegerToColor(cfg.sky[0]), b=Phaser.Display.Color.IntegerToColor(cfg.sky[1]);
    for(let i=0;i<H;i+=2){
      const t=i/H;
      const col=Phaser.Display.Color.Interpolate.ColorWithColor(a,b,100,Math.floor(t*100));
      g.fillStyle(Phaser.Display.Color.GetColor(col.r,col.g,col.b),1); g.fillRect(0,i,W,2);
    }
    const m1=this.add.graphics(); m1.fillStyle(cfg.mtn[0],0.22);
    m1.beginPath(); m1.moveTo(0,H); m1.lineTo(0,H*0.66); m1.lineTo(W*0.18,H*0.50); m1.lineTo(W*0.34,H*0.62);
    m1.lineTo(W*0.52,H*0.40); m1.lineTo(W*0.70,H*0.60); m1.lineTo(W*0.86,H*0.46); m1.lineTo(W,H*0.62); m1.lineTo(W,H); m1.closePath(); m1.fillPath();
    const m2=this.add.graphics(); m2.fillStyle(cfg.mtn[1],0.24);
    m2.beginPath(); m2.moveTo(0,H); m2.lineTo(0,H*0.80); m2.lineTo(W*0.22,H*0.68); m2.lineTo(W*0.42,H*0.82);
    m2.lineTo(W*0.60,H*0.64); m2.lineTo(W*0.80,H*0.80); m2.lineTo(W,H*0.68); m2.lineTo(W,H); m2.closePath(); m2.fillPath();
    // ambient particles for waterfall / blizzard
    if(cfg.key==="waterfall"||cfg.key==="blizzard"){
      this.ambient=this.add.graphics().setDepth(2).setAlpha(0.5);
      this.flakes=[]; for(let i=0;i<26;i++) this.flakes.push({x:Math.random()*W,y:Math.random()*H,s:0.6+Math.random()*1.4});
    }
  }
  update(_,dt){
    if(this.ambient){
      const blue=this.cfg.key==="waterfall"; this.ambient.clear(); this.ambient.fillStyle(blue?0xBfe6f2:0xffffff,0.7);
      for(const f of this.flakes){ f.y+= (blue?3.4:1.1)*f.s; if(f.y>H){ f.y=-4; f.x=Math.random()*W; }
        if(blue) this.ambient.fillRect(f.x,f.y,1.4,8*f.s); else this.ambient.fillCircle(f.x,f.y,1.4*f.s);
      }
    }
  }

  // ---------- HUD ----------
  buildHUD(){
    const cfg=this.cfg;
    this.add.text(MARGIN,14,cfg.name,{fontFamily:"Arial",fontSize:"26px",fontStyle:"bold",color:HEX(cfg.accentD)});
    this.add.text(MARGIN,46,cfg.sub,{fontFamily:"Arial",fontSize:"12px",fontStyle:"italic",color:HEX(C.ink)}).setAlpha(0.7);
    // menu button
    const mx=W-MARGIN-78, my=14, mw=78, mh=30;
    const mg=this.add.graphics(); mg.fillStyle(0xffffff,0.9); mg.fillRoundedRect(mx,my,mw,mh,9);
    this.add.text(mx+mw/2,my+mh/2,"☰ Menu",{fontFamily:"Arial",fontSize:"13px",fontStyle:"bold",color:HEX(C.ink)}).setOrigin(0.5);
    const mz=this.add.zone(mx,my,mw,mh).setOrigin(0).setInteractive();
    mz.on("pointerup",()=>{ this.shutdownTimers(); this.scene.start("select"); });
    // stat chips
    const chip=(x,w,lbl)=>{ const g=this.add.graphics(); g.fillStyle(0xffffff,0.92); g.fillRoundedRect(x,72,w,46,11);
      this.add.text(x+10,78,lbl,{fontFamily:"Arial",fontSize:"9px",color:HEX(C.mute)}); };
    chip(MARGIN,92,"LEVEL"); chip(MARGIN+102,128,"SCORE"); chip(MARGIN+242,W-2*MARGIN-242,"BEST WORD");
    this.levelTxt=this.add.text(MARGIN+10,90,"1",{fontFamily:"Arial",fontSize:"22px",fontStyle:"bold",color:HEX(cfg.accentD)});
    this.scoreTxt=this.add.text(MARGIN+112,90,"0",{fontFamily:"Arial",fontSize:"22px",fontStyle:"bold",color:HEX(C.ink)});
    this.bestTxt=this.add.text(MARGIN+252,92,"—",{fontFamily:"Arial",fontSize:"15px",fontStyle:"bold",color:HEX(C.teal)});
    this.comboTxt=this.add.text(W-MARGIN,50,"",{fontFamily:"Arial",fontSize:"15px",fontStyle:"bold",color:HEX(cfg.accentD)}).setOrigin(1,0);
  }

  buildBoardFrame(){
    const g=this.add.graphics();
    g.fillStyle(0xffffff,1); g.fillRoundedRect(BOARD_LEFT-6,BOARD_TOP-6,BOARD_W+12,BOARD_H+12,16);
    g.lineStyle(2,0xEADFCA,1); g.strokeRoundedRect(BOARD_LEFT-6,BOARD_TOP-6,BOARD_W+12,BOARD_H+12,16);
    const w=this.add.graphics(); w.fillStyle(0xE3EEF4,1);
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) w.fillRoundedRect(BOARD_LEFT+c*CELL+GAP/2,BOARD_TOP+r*CELL+GAP/2,TILE,TILE,5);
    this.dangerGfx=this.add.graphics();
  }

  buildControls(){
    const cfg=this.cfg;
    // power row
    this.add.text(MARGIN,604,"POWER",{fontFamily:"Arial",fontSize:"10px",fontStyle:"bold",color:HEX(C.mute)});
    this.energyTxt=this.add.text(W-MARGIN,604,"⚡ 0",{fontFamily:"Arial",fontSize:"13px",fontStyle:"bold",color:HEX(cfg.accentD)}).setOrigin(1,0);
    const pw=(W-2*MARGIN-2*8)/3, py=622, ph=44;
    this.powerBtns=[];
    WS.POWERS.forEach((p,i)=>{
      const x=MARGIN+i*(pw+8);
      const cont=this.add.container(0,0);
      const g=this.add.graphics(); cont.add(g);
      const nt=this.add.text(x+pw/2,py+11,p.name,{fontFamily:"Arial",fontSize:"12px",fontStyle:"bold",color:"#ffffff"}).setOrigin(0.5);
      const ct=this.add.text(x+pw/2,py+28,"⚡"+p.cost,{fontFamily:"Arial",fontSize:"11px",color:"#ffffff"}).setOrigin(0.5);
      cont.add([nt,ct]);
      const z=this.add.zone(x,py,pw,ph).setOrigin(0).setInteractive();
      z.on("pointerup",()=>this.usePower(p));
      this.powerBtns.push({p,g,nt,ct,x,py,pw,ph});
    });
    // word + preview
    this.wordTxt=this.add.text(W/2,672,"",{fontFamily:"Arial",fontSize:"24px",fontStyle:"bold",color:HEX(cfg.accentD)}).setOrigin(0.5,0);
    this.previewTxt=this.add.text(W/2,702,"",{fontFamily:"Arial",fontSize:"13px",color:HEX(C.mute)}).setOrigin(0.5,0);
    // clear / play
    const by=724, bh=56, bw=(W-2*MARGIN-12)/2;
    this.clearBtn=this.makeButton(MARGIN,by,bw,bh,"Clear",C.teal,C.tealD,()=>this.clearSelection());
    this.playBtn=this.makeButton(MARGIN+bw+12,by,bw,bh,"Play",cfg.accent,cfg.accentD,()=>this.submit());
  }

  makeButton(x,y,w,h,label,fill,shadow,cb){
    const g=this.add.graphics();
    g.fillStyle(shadow,1); g.fillRoundedRect(x,y+4,w,h,14); g.fillStyle(fill,1); g.fillRoundedRect(x,y,w,h,14);
    const t=this.add.text(x+w/2,y+h/2,label,{fontFamily:"Arial",fontSize:"20px",fontStyle:"bold",color:"#ffffff"}).setOrigin(0.5);
    const z=this.add.zone(x,y,w,h).setOrigin(0).setInteractive();
    z.on("pointerdown",()=>{ t.y=y+h/2+3; });
    z.on("pointerup",()=>{ t.y=y+h/2; cb(); });
    z.on("pointerout",()=>{ t.y=y+h/2; });
    return {g,t,fill,shadow,x,y,w,h};
  }
  setButtonEnabled(btn,on){
    btn.g.clear();
    btn.g.fillStyle(on?btn.shadow:0xBFC6CE,1); btn.g.fillRoundedRect(btn.x,btn.y+4,btn.w,btn.h,14);
    btn.g.fillStyle(on?btn.fill:0xCED5DB,1); btn.g.fillRoundedRect(btn.x,btn.y,btn.w,btn.h,14);
    btn.t.setColor(on?"#ffffff":"#eef1f3");
  }
  updateEnergy(){
    this.energyTxt.setText("⚡ "+this.energy);
    this.powerBtns.forEach(b=>{
      const on=this.energy>=b.p.cost;
      b.g.clear(); b.g.fillStyle(on?b.p.color:0xC9D0D6,1); b.g.fillRoundedRect(b.x,b.py,b.pw,b.ph,11);
      b.nt.setAlpha(on?1:0.7); b.ct.setAlpha(on?1:0.7);
    });
  }

  // ---------- letters ----------
  pickChar(forceVowel){ if(forceVowel){ const v="aeiou"; return v[Math.floor(Math.random()*5)]; } return BAG[Math.floor(Math.random()*BAG.length)]; }
  vowelRatio(){ let v=0,n=0; for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const t=this.grid[r][c]; if(t){ n++; if(VOWELS[t.ch]) v++; } } return n? v/n:0; }

  spawnTile(seed){
    const open=[]; for(let c=0;c<COLS;c++) if(!this.grid[0][c]) open.push(c);
    if(open.length===0){ if(!seed) this.gameOver(); return; }
    const c=open[Math.floor(Math.random()*open.length)];
    let lr=ROWS-1; while(lr>=0 && this.grid[lr][c]) lr--;
    if(lr<0) return;
    const forceV=this.vowelRatio()<0.34 && Math.random()<0.8;
    const ch=this.pickChar(forceV), bonus=WS.rollBonus();
    const ember = !seed && this.cfg.emberChance && Math.random()<this.cfg.emberChance;
    const tile=this.makeTile(ch,bonus,c,lr,ember);
    this.grid[lr][c]=tile;
    const targetY=this.cellY(lr);
    if(seed){ tile.cont.y=targetY; }
    else { tile.cont.y=this.cellY(lr)-(lr+2)*CELL; this.tweens.add({targets:tile.cont,y:targetY,duration:160+lr*12,ease:"Quad.easeIn"}); }
  }

  makeTile(ch,bonus,c,r,ember){
    const x=this.cellX(c), y=this.cellY(r);
    const cont=this.add.container(x,y);
    const g=this.add.graphics();
    const txt=this.add.text(TILE/2,TILE/2-2,ch.toUpperCase(),{fontFamily:"Arial",fontSize:(TILE*0.6)+"px",fontStyle:"bold",color:HEX(bonus.ink)}).setOrigin(0.5);
    const val=this.add.text(TILE-4,TILE-3,""+VALUES[ch],{fontFamily:"Arial",fontSize:"9px",fontStyle:"bold",color:HEX(bonus.ink)}).setOrigin(1,1).setAlpha(0.6);
    cont.add([g,txt,val]);
    let tagTxt=null;
    if(bonus.tag){ tagTxt=this.add.text(3,2,bonus.tag,{fontFamily:"Arial",fontSize:"8px",fontStyle:"bold",color:"#ffffff"}).setAlpha(0.9); cont.add(tagTxt); }
    const tile={ch,bonus,c,r,cont,g,txt,val,sel:false,ember:false,fuse:0,fuseTxt:null,frost:null};
    this.paintTile(tile,false);
    this.tileLayer.add(cont);
    if(ember) this.igniteEmber(tile);
    return tile;
  }
  igniteEmber(tile){
    tile.ember=true; tile.fuse=this.cfg.emberFuse;
    tile.fuseTxt=this.add.text(3,2,"",{fontFamily:"Arial",fontSize:"10px",fontStyle:"bold",color:"#ffffff"});
    tile.cont.add(tile.fuseTxt);
    this.paintTile(tile,tile.sel);
  }
  paintTile(tile,selected){
    const g=tile.g; g.clear();
    g.fillStyle(0xD9B98A,1); g.fillRoundedRect(0,3,TILE,TILE,6);
    let fill=tile.bonus.fill;
    if(tile.ember) fill=0xF06236;
    g.fillStyle(fill,1); g.fillRoundedRect(0,0,TILE,TILE,6);
    if(tile.ember){ g.lineStyle(2,0xFFC04A,1); g.strokeRoundedRect(1,1,TILE-2,TILE-2,6); }
    if(selected){ g.lineStyle(3,C.selOutline,1); g.strokeRoundedRect(1,1,TILE-2,TILE-2,6); }
  }

  cellX(c){ return BOARD_LEFT+c*CELL+GAP/2; }
  cellY(r){ return BOARD_TOP+r*CELL+GAP/2; }
  colAt(x){ return Math.floor((x-BOARD_LEFT)/CELL); }
  rowAt(y){ return Math.floor((y-BOARD_TOP)/CELL); }

  // ---------- selection ----------
  tileUnder(p){ const c=this.colAt(p.x), r=this.rowAt(p.y); if(r<0||r>=ROWS||c<0||c>=COLS) return null; return this.grid[r][c]; }
  onDown(p){ if(!this.running) return; const t=this.tileUnder(p); if(!t) return; this.dragging=true; this.clearSelection(true); this.addToSelection(t); }
  onMove(p){
    if(!this.dragging||!this.running) return; const t=this.tileUnder(p); if(!t) return;
    if(this.selection.length>=2 && t===this.selection[this.selection.length-2]){ const d=this.selection.pop(); d.sel=false; this.paintTile(d,false); this.refreshSelection(); return; }
    if(t.sel) return;
    const last=this.selection[this.selection.length-1];
    if(!last){ this.addToSelection(t); return; }
    if(Math.abs(t.r-last.r)<=1 && Math.abs(t.c-last.c)<=1) this.addToSelection(t);
  }
  addToSelection(t){ t.sel=true; this.selection.push(t); this.paintTile(t,true); this.beep(360+this.selection.length*30,0.04,"sine",0.04); this.refreshSelection(); }
  clearSelection(silent){ this.selection.forEach(t=>{ t.sel=false; this.paintTile(t,false); }); this.selection=[]; if(!silent) this.beep(240,0.05,"sine",0.04); this.refreshSelection(); }
  word(){ return this.selection.map(t=>t.ch).join(""); }
  refreshSelection(){
    const w=this.word(); this.wordTxt.setText(w.toUpperCase());
    const valid=w.length>=3 && DICT.has(w);
    if(w.length>=3){ const pts=this.scoreFor(this.selection); this.previewTxt.setText(valid?("+"+pts+" points"):"not a word"); this.previewTxt.setColor(valid?HEX(C.teal):HEX(C.mute)); }
    else { this.previewTxt.setText(w.length?"3+ letters":""); this.previewTxt.setColor(HEX(C.mute)); }
    this.setButtonEnabled(this.playBtn,valid);
    this.selGfx.clear();
    if(this.selection.length){ this.selGfx.lineStyle(4,this.cfg.accent,0.6); this.selGfx.beginPath();
      this.selection.forEach((t,i)=>{ const x=this.cellX(t.c)+TILE/2,y=this.cellY(t.r)+TILE/2; if(i===0) this.selGfx.moveTo(x,y); else this.selGfx.lineTo(x,y); });
      this.selGfx.strokePath(); }
  }
  scoreFor(sel){ let base=0,wm=1; sel.forEach(t=>{ base+=VALUES[t.ch]*t.bonus.lm*(t.ember?2:1); wm*=t.bonus.wm; }); const lenMult=1+0.25*(sel.length-3); const comboMult=1+0.12*Math.max(0,this.combo); return Math.round(base*wm*lenMult*comboMult); }

  submit(){
    const w=this.word();
    if(w.length<3 || !DICT.has(w)){ this.cameras.main.shake(180,0.006); this.beep(120,0.2,"sawtooth",0.05); return; }
    const pts=this.scoreFor(this.selection); this.score+=pts; this.words++; this.combo++; this.comboTimer=7000;
    this.energy=Math.min(99,this.energy+this.selection.length);
    if(pts>this.bestPts){ this.bestPts=pts; this.best=w.toUpperCase(); this.bestTxt.setText(this.best); }
    WS.store.setBestWord(w.toUpperCase(),pts);
    this.flyup("+"+pts,this.selection[Math.floor(this.selection.length/2)]);
    this.cameras.main.flash(120,255,247,210);
    if(w.length>=6) this.cameras.main.shake(160,0.004);
    this.beep(660,0.09,"sine",0.06); this.time.delayedCall(70,()=>this.beep(880,0.1,"sine",0.05));
    const toClear=this.selection.slice();
    toClear.forEach(t=>{ this.grid[t.r][t.c]=null; this.burst(t); this.destroyTile(t,true); });
    this.selection=[];
    this.time.delayedCall(190,()=>this.collapse());
    this.scoreTxt.setText(""+this.score);
    if(this.words%8===0) this.levelUp();
    this.updateEnergy(); this.refreshSelection();
  }

  destroyTile(t,anim){
    if(anim) this.tweens.add({targets:t.cont,scale:0,alpha:0,duration:180,ease:"Back.easeIn",onComplete:()=>t.cont.destroy()});
    else t.cont.destroy();
  }

  collapse(){
    for(let c=0;c<COLS;c++){
      const stack=[]; for(let r=ROWS-1;r>=0;r--) if(this.grid[r][c]) stack.push(this.grid[r][c]);
      for(let r=0;r<ROWS;r++) this.grid[r][c]=null;
      let r=ROWS-1; for(const t of stack){ this.grid[r][c]=t; t.r=r; const ty=this.cellY(r);
        if(Math.abs(t.cont.y-ty)>1) this.tweens.add({targets:t.cont,y:ty,duration:140,ease:"Quad.easeIn"}); r--; }
    }
    this.updateDanger();
  }
  updateDanger(){ this.dangerGfx.clear(); let d=false; for(let c=0;c<COLS;c++) if(this.grid[1][c]){ d=true; break; }
    if(d){ this.dangerGfx.fillStyle(C.danger,0.12); this.dangerGfx.fillRect(BOARD_LEFT,BOARD_TOP,BOARD_W,CELL*2); } }

  tick(){
    if(!this.running) return;
    if(this.time.now < this.slowUntil) return;        // Solid Ground pause
    const cfg=this.cfg;
    let drops = cfg.mode==="wave" ? cfg.waveCount : (cfg.drops + Math.floor((this.level-1)/3));
    for(let i=0;i<drops;i++) this.spawnTile(false);
    this.updateDanger();
    if(this.combo>0){ this.comboTimer-=( cfg.mode==="wave"?cfg.waveEvery:this.spawnInterval); if(this.comboTimer<=0) this.combo=0; }
    this.comboTxt.setText(this.combo>1?("COMBO x"+this.combo):"");
  }

  levelUp(){
    this.level++; this.levelTxt.setText(""+this.level);
    this.spawnInterval=Math.max(this.cfg.minInterval,this.spawnInterval-this.cfg.ramp);
    if(this.cfg.mode!=="wave") this.startSpawn();
    this.toast("Level "+this.level+" — faster!"); this.beep(740,0.12,"square",0.05);
  }

  // ---------- volcano embers / blizzard frost ----------
  service(){
    if(!this.running) return;
    if(this.cfg.emberChance){
      const erupt=[];
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const t=this.grid[r][c];
        if(t&&t.ember){ t.fuse-=250; if(t.fuse<=0) erupt.push(t); else if(t.fuseTxt) t.fuseTxt.setText(""+Math.ceil(t.fuse/1000)); }
      }
      if(erupt.length){ erupt.forEach(t=>{ this.grid[t.r][t.c]=null; this.burst(t); this.destroyTile(t,false); });
        this.cameras.main.shake(220,0.006); this.beep(110,0.25,"sawtooth",0.06);
        this.energy=Math.max(0,this.energy-0); this.combo=0; this.toast("Ember erupted!");
        this.time.delayedCall(60,()=>this.collapse()); this.updateEnergy(); }
    }
  }
  frostWave(){
    if(!this.running) return;
    const occ=[]; for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const t=this.grid[r][c]; if(t&&!t.frost) occ.push(t); }
    Phaser.Utils.Array.Shuffle(occ);
    const n=Math.min(this.cfg.frostCount,occ.length);
    for(let i=0;i<n;i++){ const t=occ[i]; this.applyFrost(t); }
  }
  applyFrost(t){
    if(!t.cont||t.frost) return;
    const fr=this.add.graphics(); fr.fillStyle(0xDCEFFA,0.92); fr.fillRoundedRect(0,0,TILE,TILE,6);
    fr.lineStyle(2,0xA9D3EC,1); fr.strokeRoundedRect(1,1,TILE-2,TILE-2,6); t.cont.add(fr);
    const fl=this.add.text(TILE/2,TILE/2,"❄",{fontFamily:"Arial",fontSize:(TILE*0.5)+"px",color:"#7FB4D6"}).setOrigin(0.5); t.cont.add(fl);
    t.frost={fr,fl}; t.txt.setVisible(false); t.val.setVisible(false);
    this.time.delayedCall(this.cfg.frostDur,()=>{ if(t.frost){ t.frost.fr.destroy(); t.frost.fl.destroy(); t.frost=null; if(t.txt){ t.txt.setVisible(true); t.val.setVisible(true);} } });
  }

  // ---------- powers ----------
  usePower(p){
    if(!this.running || this.energy<p.cost) return;
    this.energy-=p.cost; this.beep(620,0.09,"triangle",0.05);
    if(p.key==="slow"){ this.slowUntil=this.time.now+8000; this.toast("Solid ground — slowed!"); }
    else if(p.key==="shuffle"){ this.shufflePower(); this.toast("Letters re-rolled!"); }
    else if(p.key==="rockfall"){ this.rockfallPower(); this.toast("Rockfall!"); }
    this.clearSelection(true); this.updateEnergy();
  }
  shufflePower(){
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const t=this.grid[r][c]; if(!t||t.ember) continue;
      t.ch=this.pickChar(Math.random()<0.4); t.txt.setText(t.ch.toUpperCase()); t.val.setText(""+VALUES[t.ch]);
      this.tweens.add({targets:t.cont,scaleX:0.6,duration:90,yoyo:true}); }
  }
  rockfallPower(){
    const rows=[ROWS-1,ROWS-2];
    rows.forEach(r=>{ for(let c=0;c<COLS;c++){ const t=this.grid[r][c]; if(t){ this.grid[r][c]=null; this.burst(t); this.destroyTile(t,true); } } });
    this.cameras.main.shake(260,0.008); this.beep(140,0.25,"sawtooth",0.06);
    this.time.delayedCall(200,()=>this.collapse());
  }

  // ---------- juice ----------
  flyup(txt,t){ if(!t) return; const x=this.cellX(t.c)+TILE/2,y=this.cellY(t.r);
    const f=this.add.text(x,y,txt,{fontFamily:"Arial",fontSize:"30px",fontStyle:"bold",color:HEX(this.cfg.accentD)}).setOrigin(0.5).setDepth(60);
    this.tweens.add({targets:f,y:y-70,alpha:0,scale:1.2,duration:900,ease:"Cubic.easeOut",onComplete:()=>f.destroy()}); }
  burst(t){ const x=this.cellX(t.c)+TILE/2,y=this.cellY(t.r)+TILE/2;
    for(let i=0;i<6;i++){ const p=this.add.circle(x,y,Phaser.Math.Between(2,4),t.ember?0xF06236:t.bonus.fill).setDepth(55);
      this.tweens.add({targets:p,x:x+Phaser.Math.Between(-30,30),y:y+Phaser.Math.Between(-30,20),alpha:0,duration:Phaser.Math.Between(300,520),onComplete:()=>p.destroy()}); } }
  toast(msg){ const t=this.add.text(W/2,BOARD_TOP+BOARD_H/2,msg,{fontFamily:"Arial",fontSize:"22px",fontStyle:"bold",color:"#ffffff",backgroundColor:HEX(this.cfg.accentD),padding:{x:16,y:9}}).setOrigin(0.5).setDepth(80).setAlpha(0);
    this.tweens.add({targets:t,alpha:1,duration:150,yoyo:true,hold:700,onComplete:()=>t.destroy()}); }
  beep(f,d,type,v){ try{ if(!this.AC) this.AC=new (window.AudioContext||window.webkitAudioContext)();
    const o=this.AC.createOscillator(),g=this.AC.createGain(); o.type=type||"sine"; o.frequency.value=f; g.gain.value=v||0.05;
    o.connect(g); g.connect(this.AC.destination); o.start(); o.stop(this.AC.currentTime+d); g.gain.exponentialRampToValueAtTime(0.0001,this.AC.currentTime+d);}catch(e){} }

  shutdownTimers(){ if(this.spawnEvent)this.spawnEvent.remove(); if(this.svc)this.svc.remove(); if(this.frostEvt)this.frostEvt.remove(); this.running=false; }

  gameOver(){
    if(this.over) return; this.over=true; this.running=false; this.shutdownTimers();
    const isBest=WS.store.setBest(this.cfg.key,this.score);
    this.beep(160,0.4,"sawtooth",0.06);
    const ov=this.add.container(0,0).setDepth(100);
    const sh=this.add.graphics(); sh.fillStyle(0x0d1426,0.7); sh.fillRect(0,0,W,H); ov.add(sh);
    const cardW=W-60,cardH=340,cx=30,cy=H/2-cardH/2;
    const g=this.add.graphics(); g.fillStyle(0xffffff,1); g.fillRoundedRect(cx,cy,cardW,cardH,22); ov.add(g);
    const add=o=>ov.add(o);
    add(this.add.text(W/2,cy+30,"Buried!",{fontFamily:"Arial",fontSize:"30px",fontStyle:"bold",color:HEX(this.cfg.accentD)}).setOrigin(0.5));
    add(this.add.text(W/2,cy+64,this.cfg.name+(isBest?"  —  NEW BEST!":""),{fontFamily:"Arial",fontSize:"13px",fontStyle:"bold",color:HEX(C.teal)}).setOrigin(0.5));
    add(this.add.text(W/2,cy+112,""+this.score,{fontFamily:"Arial",fontSize:"50px",fontStyle:"bold",color:HEX(C.ink)}).setOrigin(0.5));
    add(this.add.text(W/2,cy+150,"points · "+this.words+" words · level "+this.level,{fontFamily:"Arial",fontSize:"13px",color:HEX(C.mute)}).setOrigin(0.5));
    add(this.add.text(W/2,cy+180,"Best (this world): "+WS.store.best(this.cfg.key),{fontFamily:"Arial",fontSize:"13px",fontStyle:"bold",color:HEX(C.ink)}).setOrigin(0.5));
    if(this.best) add(this.add.text(W/2,cy+204,"Best word: "+this.best+" ("+this.bestPts+")",{fontFamily:"Arial",fontSize:"13px",color:HEX(C.ink)}).setOrigin(0.5));
    const bw=150,bh=50,gap=14,tot=bw*2+gap,bx=W/2-tot/2,by=cy+cardH-66;
    const mk=(x,fill,shadow,label,cb)=>{ const bg=this.add.graphics(); bg.fillStyle(shadow,1); bg.fillRoundedRect(x,by+4,bw,bh,14); bg.fillStyle(fill,1); bg.fillRoundedRect(x,by,bw,bh,14); add(bg);
      add(this.add.text(x+bw/2,by+bh/2,label,{fontFamily:"Arial",fontSize:"18px",fontStyle:"bold",color:"#ffffff"}).setOrigin(0.5));
      const z=this.add.zone(x,by,bw,bh).setOrigin(0).setInteractive(); add(z); z.on("pointerup",cb); };
    mk(bx,C.teal,C.tealD,"Menu",()=>this.scene.start("select"));
    mk(bx+bw+gap,this.cfg.accent,this.cfg.accentD,"Retry",()=>this.scene.restart({world:this.cfg.key}));
  }
};
})();
</script>
<script>/* Wordslide — Home + Select scenes. Reads window.WS. */
(function(){
"use strict";
const WS=window.WS;
const {W,H,MARGIN,C,HEX}=WS;

function skyBG(scene, topHex, botHex){
  const g=scene.add.graphics();
  const a=Phaser.Display.Color.IntegerToColor(topHex), b=Phaser.Display.Color.IntegerToColor(botHex);
  for(let i=0;i<H;i+=2){ const t=i/H; const col=Phaser.Display.Color.Interpolate.ColorWithColor(a,b,100,Math.floor(t*100));
    g.fillStyle(Phaser.Display.Color.GetColor(col.r,col.g,col.b),1); g.fillRect(0,i,W,2); }
  const m1=scene.add.graphics(); m1.fillStyle(0xC75B33,0.18);
  m1.beginPath(); m1.moveTo(0,H); m1.lineTo(0,H*0.70); m1.lineTo(W*0.2,H*0.54); m1.lineTo(W*0.4,H*0.66);
  m1.lineTo(W*0.56,H*0.46); m1.lineTo(W*0.74,H*0.64); m1.lineTo(W*0.9,H*0.5); m1.lineTo(W,H*0.64); m1.lineTo(W,H); m1.closePath(); m1.fillPath();
  const m2=scene.add.graphics(); m2.fillStyle(0x56C06A,0.2);
  m2.beginPath(); m2.moveTo(0,H); m2.lineTo(0,H*0.82); m2.lineTo(W*0.24,H*0.7); m2.lineTo(W*0.46,H*0.84);
  m2.lineTo(W*0.64,H*0.66); m2.lineTo(W*0.82,H*0.82); m2.lineTo(W,H*0.7); m2.lineTo(W,H); m2.closePath(); m2.fillPath();
}

WS.HomeScene = class extends Phaser.Scene {
  constructor(){ super("home"); }
  create(){
    skyBG(this,0x8FD6EC,0xFFF7E8);
    // logo tiles row "SLIDE"
    const letters=["S","L","I","D","E"], tw=58, gap=8, tot=letters.length*tw+(letters.length-1)*gap, sx=(W-tot)/2, ty=250;
    letters.forEach((ch,i)=>{ const x=sx+i*(tw+gap);
      const g=this.add.graphics(); g.fillStyle(0xD9B98A,1); g.fillRoundedRect(x,ty+4,tw,tw,10);
      g.fillStyle(i===4?0xC75B33:0xFFF1CE,1); g.fillRoundedRect(x,ty,tw,tw,10);
      this.add.text(x+tw/2,ty+tw/2,ch,{fontFamily:"Arial",fontSize:"34px",fontStyle:"bold",color:i===4?"#ffffff":HEX(0x2B4257)}).setOrigin(0.5);
    });
    this.add.text(W/2,150,"Word",{fontFamily:"Arial",fontSize:"58px",fontStyle:"bold",color:HEX(C.teal)}).setOrigin(1,0.5).setX(W/2-2);
    this.add.text(W/2,150,"slide",{fontFamily:"Arial",fontSize:"58px",fontStyle:"bold",color:HEX(C.clay)}).setOrigin(0,0.5).setX(W/2+2);
    this.add.text(W/2,360,"Spell fast. Before it falls.",{fontFamily:"Arial",fontSize:"20px",fontStyle:"italic",color:HEX(C.ink)}).setOrigin(0.5).setAlpha(0.8);
    // best stats
    const tb=WS.store.totalBest(), bw=WS.store.bestWord();
    this.add.text(W/2,430,"Best score: "+tb+(bw.w?("   ·   Best word: "+bw.w+" ("+bw.p+")"):""),{fontFamily:"Arial",fontSize:"13px",color:HEX(C.mute)}).setOrigin(0.5);
    // play button
    const bw2=220,bh=64,bx=W/2-bw2/2,by=500;
    const g=this.add.graphics(); g.fillStyle(C.clayD,1); g.fillRoundedRect(bx,by+5,bw2,bh,16); g.fillStyle(C.clay,1); g.fillRoundedRect(bx,by,bw2,bh,16);
    const t=this.add.text(W/2,by+bh/2,"Play",{fontFamily:"Arial",fontSize:"26px",fontStyle:"bold",color:"#ffffff"}).setOrigin(0.5);
    const z=this.add.zone(bx,by,bw2,bh).setOrigin(0).setInteractive();
    z.on("pointerdown",()=>t.setY(by+bh/2+3)); z.on("pointerup",()=>{ t.setY(by+bh/2); this.scene.start("select"); }); z.on("pointerout",()=>t.setY(by+bh/2));
    this.add.text(W/2,H-30,"v0.2 — tap Play, then choose a world",{fontFamily:"Arial",fontSize:"11px",color:HEX(C.mute)}).setOrigin(0.5);
  }
};

WS.SelectScene = class extends Phaser.Scene {
  constructor(){ super("select"); }
  create(){
    skyBG(this,0xCDEEF7,0xFFF7E8);
    this.add.text(MARGIN,24,"Choose your slide",{fontFamily:"Arial",fontSize:"26px",fontStyle:"bold",color:HEX(C.ink)});
    this.add.text(MARGIN,58,"Each world slides differently. All unlocked for testing.",{fontFamily:"Arial",fontSize:"12px",color:HEX(C.mute)});
    // back
    const bx=W-MARGIN-72,by=24,bbw=72,bbh=30;
    const bg=this.add.graphics(); bg.fillStyle(0xffffff,0.9); bg.fillRoundedRect(bx,by,bbw,bbh,9);
    this.add.text(bx+bbw/2,by+bbh/2,"‹ Home",{fontFamily:"Arial",fontSize:"13px",fontStyle:"bold",color:HEX(C.ink)}).setOrigin(0.5);
    const bz=this.add.zone(bx,by,bbw,bbh).setOrigin(0).setInteractive(); bz.on("pointerup",()=>this.scene.start("home"));
    // cards
    const top=104, cw=W-2*MARGIN, n=WS.WORLD_ORDER.length, gap=12, ch=(H-top-30-(n-1)*gap)/n;
    WS.WORLD_ORDER.forEach((key,i)=>{
      const cfg=WS.WORLDS[key], y=top+i*(ch+gap), x=MARGIN;
      const g=this.add.graphics(); g.fillStyle(0xffffff,0.96); g.fillRoundedRect(x,y,cw,ch,16);
      g.lineStyle(2,0xEADFCA,1); g.strokeRoundedRect(x,y,cw,ch,16);
      // accent circle with order
      const cd=Math.min(ch-22,56), cxx=x+18+cd/2, cyy=y+ch/2;
      g.fillStyle(cfg.accent,1); g.fillCircle(cxx,cyy,cd/2);
      this.add.text(cxx,cyy,""+cfg.order,{fontFamily:"Arial",fontSize:"22px",fontStyle:"bold",color:"#ffffff"}).setOrigin(0.5);
      const tx=x+18+cd+16;
      this.add.text(tx,y+ch/2-22,cfg.name,{fontFamily:"Arial",fontSize:"20px",fontStyle:"bold",color:HEX(cfg.accentD)});
      this.add.text(tx,y+ch/2+4,cfg.sub,{fontFamily:"Arial",fontSize:"12px",color:HEX(C.mute)});
      const best=WS.store.best(key);
      this.add.text(x+cw-16,y+ch/2,(best?("Best "+best):"Play ›"),{fontFamily:"Arial",fontSize:"13px",fontStyle:"bold",color:HEX(C.teal)}).setOrigin(1,0.5);
      const z=this.add.zone(x,y,cw,ch).setOrigin(0).setInteractive();
      z.on("pointerup",()=>this.scene.start("game",{world:key}));
    });
  }
};
})();
</script>
<script>/* Wordslide — boot. Creates the Phaser game with all scenes. Reads window.WS. */
(function(){
"use strict";
const WS=window.WS;
const config = {
  type: Phaser.AUTO,
  width: WS.W, height: WS.H,
  backgroundColor: "#8FD6EC",
  parent: "game-root",
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: [WS.HomeScene, WS.SelectScene, WS.GameScene]
};
function start(){ new Phaser.Game(config); }
if(document.readyState==="complete") start();
else window.addEventListener("load", start);
})();
</script>
</body>
